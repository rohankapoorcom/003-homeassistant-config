###############################################################################
#  @author       :  Rohan Kapoor
#  @date         :  07/12/2026
#  @package      :  Garage
#  @description  :  Automations in the Garage
###############################################################################
---
homeassistant:
  customize:
    ################################################
    ## Node Anchors
    ################################################

    package.node_anchors:
      customize: &customize
        package: 'garage'

################################################
## Automation
################################################
automation:
  - id: af7fca2c-eba3-472a-b3fa-95cd3e8c3519
    alias: Send Garage Vacuum Home When Garage Door Opens
    description: >-
      Sends the garage vacuum back to the dock when either garage door
      starts opening and the garage vacuum is not currently docked.
    mode: single
    triggers:
      - trigger: state
        entity_id: cover.rakesh_garage_door_door
        from: 'closed'
        to: 'opening'
      - trigger: state
        entity_id: cover.anu_garage_door_door
        from: 'closed'
        to: 'opening'
    conditions:
      - alias: "Safety check: Ensure garage vacuum is away from dock and available"
        condition: template
        value_template: >-
          {{ states('vacuum.valetudo_garage_vacuum')
          not in ['docked', 'unavailable'] }}
    actions:
      - action: vacuum.return_to_base
        target:
          entity_id: vacuum.valetudo_garage_vacuum

  - id: c1789adb-ff1e-424d-8b85-65f307bf995d
    alias: Control the Garage Lights
    mode: restart
    max_exceeded: silent
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: automation_reloaded
      - trigger: state
        entity_id: cover.anu_garage_door_door
        from: 'closed'
        to: 'open'
      - trigger: state
        entity_id: cover.rakesh_garage_door_door
        from: 'closed'
        to: 'open'
    action:
      - choose:
          - alias: If either garage door is open, then turn on the lights.
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: cover.anu_garage_door_door
                    state: 'open'
                  - condition: state
                    entity_id: cover.rakesh_garage_door_door
                    state: 'open'
            sequence:
              - action: light.turn_on
                target:
                  entity_id:
                    - light.garage_lights
              - wait_for_trigger:
                  - platform: template
                    value_template: >
                      {{ is_state('cover.anu_garage_door_door', 'closed')
                      and is_state('cover.rakesh_garage_door_door', 'closed') }}
                continue_on_timeout: false
              - delay:
                  minutes: 10
              - service: light.turn_off
                target:
                  entity_id:
                    - light.garage_lights
        default:
          - service: light.turn_off
            entity_id:
              - light.garage_lights
