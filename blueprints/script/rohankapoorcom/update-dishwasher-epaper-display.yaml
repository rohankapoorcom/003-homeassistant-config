---
blueprint:
  name: Update Dishwasher E-Paper Display
  description: >
    Update an OpenEPaperLink e-paper display with dishwasher status
    (Clean, Dirty, Running) including icons and timestamp.
  domain: script
  input:
    epaper_tag:
      name: E-Paper Tag
      description: The OpenEPaperLink e-paper tag device to update
      selector:
        device:
          filter:
            integration: open_epaper_link
  source_url: https://github.com/rohankapoorcom/homeassistant-config/blob/master/blueprints/script/rohankapoorcom/update-dishwasher-epaper-display.yaml
fields:
  state:
    name: State
    description: The current state of the dishwasher (Clean, Dirty, Running)
    example: Running
    required: true
    selector:
      text: {}
sequence:
  - action: open_epaper_link.drawcustom
    data:
      background: white
      rotate: 0
      ttl: 300
      dither: false
      payload:
        - type: text
          value: "{{ state }}"
          font: ppb.ttf
          x: 220
          y: 119
          size: 70
          color: red
          anchor: mm
        - type: text
          value: As of {{ now().strftime('%m/%d/%Y at %I:%M %p') }}
          font: ppb.ttf
          x: 9
          y: 8
          size: 15
          color: black
          anchor: la
        - type: icon
          value: silverware-clean
          x: 40
          y: 119
          size: 60
          color: black
          anchor: mm
        - type: text
          value: Dirty
          font: ppb.ttf
          x: 369
          y: 52
          size: 15
          color: black
          anchor: rs
        - type: text
          value: Clean
          font: ppb.ttf
          x: 284
          y: 52
          size: 15
          color: black
          anchor: rs
        - type: icon
          value: arrow-up
          x: 351
          y: 24
          size: 25
          color: red
          anchor: mm
        - type: icon
          value: arrow-up
          x: 259
          y: 24
          size: 25
          color: red
          anchor: mm
    target:
      device_id: !input epaper_tag
